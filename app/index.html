<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Soundvibe — Authorization</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; color: #1a1a2e; line-height: 1.6; background: #f8f9ff; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: white; border-radius: 16px; padding: 48px; max-width: 500px; width: 90%; text-align: center; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
    .icon { font-size: 3rem; margin-bottom: 16px; }
    h1 { font-size: 1.5rem; margin-bottom: 12px; }
    p { color: #555; margin-bottom: 20px; font-size: 0.95rem; }
    .code-box { background: #f4f5fb; border: 1px solid #e0e4ef; border-radius: 8px; padding: 12px 16px; font-family: monospace; font-size: 0.85rem; word-break: break-all; margin-bottom: 20px; }
    .home-link { display: inline-block; background: linear-gradient(135deg, #4263eb, #7c3aed); color: white; padding: 10px 28px; border-radius: 8px; text-decoration: none; font-weight: 600; }
    .home-link:hover { opacity: 0.9; }
    .error { color: #e53e3e; }
  </style>
</head>
<body>
  <div class="card" id="card">
    <div class="icon" id="icon">&#9203;</div>
    <h1 id="title">Completing authorization...</h1>
    <p id="message">Handing your TikTok login back to the Soundvibe app. You can close this tab once the app confirms.</p>
  </div>

  <script>
    // Local callback the Soundvibe desktop app listens on (TikTok OAuth).
    var APP_CALLBACK = 'http://localhost:8977/callback';

    var params = new URLSearchParams(window.location.search);
    var code = params.get('code');
    var state = params.get('state');
    var error = params.get('error');
    var errorDescription = params.get('error_description');

    var icon = document.getElementById('icon');
    var title = document.getElementById('title');
    var message = document.getElementById('message');
    var card = document.getElementById('card');

    function buildAppUrl() {
      var qs = [];
      if (code) qs.push('code=' + encodeURIComponent(code));
      if (state) qs.push('state=' + encodeURIComponent(state));
      if (error) qs.push('error=' + encodeURIComponent(error));
      if (errorDescription) qs.push('error_description=' + encodeURIComponent(errorDescription));
      return APP_CALLBACK + '?' + qs.join('&');
    }

    if (code) {
      // Forward the authorization code to the desktop app's local server.
      var appUrl = buildAppUrl();
      // Fire the handoff (top-level navigation to localhost is allowed).
      window.location.href = appUrl;

      // Show confirmation in case the app isn't running / handoff is blocked.
      setTimeout(function () {
        icon.textContent = '✅';
        title.textContent = 'TikTok Connected!';
        message.innerHTML = 'Your authorization is complete. Return to the <strong>Soundvibe desktop app</strong> — it should now show your TikTok account as connected.<br><br>If nothing happened, make sure Soundvibe is open and click the button below.';
        card.innerHTML += '<a class="home-link" href="' + appUrl + '">Return to Soundvibe</a>';
      }, 1200);
    } else if (error) {
      // Forward the error too, so the app stops waiting.
      window.location.href = buildAppUrl();
      icon.textContent = '❌';
      title.textContent = 'Authorization Failed';
      title.className = 'error';
      message.innerHTML = 'TikTok authorization was denied or encountered an error.<br>Error: ' + (errorDescription || error) + '<br><br>Please try again from the Soundvibe app.';
    } else {
      icon.textContent = '🚀';
      title.textContent = 'Soundvibe';
      message.innerHTML = 'Welcome to Soundvibe! Open the desktop app and click <strong>Connect TikTok</strong> to get started, or <a href="../">visit the homepage</a> to learn more.';
    }
  </script>
</body>
</html>
