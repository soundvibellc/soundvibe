<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Soundvibe — Authorization</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; color: #1a1a2e; line-height: 1.6; background: #f8f9ff; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: white; border-radius: 16px; padding: 48px; max-width: 500px; width: 90%; text-align: center; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
    .icon { font-size: 3rem; margin-bottom: 16px; }
    h1 { font-size: 1.5rem; margin-bottom: 12px; }
    p { color: #555; margin-bottom: 20px; font-size: 0.95rem; }
    .code-box { background: #f4f5fb; border: 1px solid #e0e4ef; border-radius: 8px; padding: 12px 16px; font-family: monospace; font-size: 0.85rem; word-break: break-all; margin-bottom: 20px; }
    .home-link { display: inline-block; background: linear-gradient(135deg, #4263eb, #7c3aed); color: white; padding: 10px 28px; border-radius: 8px; text-decoration: none; font-weight: 600; }
    .home-link:hover { opacity: 0.9; }
    .error { color: #e53e3e; }
  </style>
</head>
<body>
  <div class="card" id="card">
    <div class="icon" id="icon">&#9203;</div>
    <h1 id="title">Processing authorization...</h1>
    <p id="message">Please wait while we complete your TikTok login.</p>
  </div>

  <script>
    var params = new URLSearchParams(window.location.search);
    var code = params.get('code');
    var error = params.get('error');
    var icon = document.getElementById('icon');
    var title = document.getElementById('title');
    var message = document.getElementById('message');
    var card = document.getElementById('card');

    if (code) {
      icon.textContent = '✅';
      title.textContent = 'TikTok Connected!';
      message.innerHTML = 'Your TikTok account has been authorized successfully. You can now use Soundvibe to publish content to TikTok.<br><br>Open the Soundvibe desktop app to start posting.';
      card.innerHTML += '<br><a href="../" class="home-link">Back to Soundvibe</a>';
    } else if (error) {
      icon.textContent = '❌';
      title.textContent = 'Authorization Failed';
      title.className = 'error';
      message.innerHTML = 'TikTok authorization was denied or encountered an error.<br>Error: ' + (params.get('error_description') || error) + '<br><br>Please try again.';
      card.innerHTML += '<br><a href="../#login" class="home-link">Try Again</a>';
    } else {
      icon.textContent = '🚀';
      title.textContent = 'Soundvibe';
      message.innerHTML = 'Welcome to Soundvibe! <a href="../#login">Connect your TikTok account</a> to get started, or <a href="../">visit the homepage</a> to learn more.';
    }
  </script>
</body>
</html>
